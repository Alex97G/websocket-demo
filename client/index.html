<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat WebSocket PRO</title>
</head>

<body>

<h2>Chat WebSocket</h2>

<input id="url" value="wss://websocket-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com"><br>
<input id="password" placeholder="Clave"><br>
<input id="username" placeholder="Usuario"><br>
<input id="room" placeholder="Sala"><br>

<button onclick="connect()">Conectar</button>

<br><br>

<input id="message" placeholder="Mensaje">
<button onclick="send()">Enviar</button>

<div id="chat"></div>

<script>
let socket;

function connect() {
  socket = new WebSocket(document.getElementById("url").value);

  socket.onopen = () => {

    log("Conectado");

    // 🔐 enviar clave
    socket.send(JSON.stringify({
      type: "auth",
      password: document.getElementById("password").value
    }));

    // 👤 unirse a sala
    socket.send(JSON.stringify({
      type: "join",
      username: document.getElementById("username").value,
      room: document.getElementById("room").value
    }));
  };

  socket.onmessage = (e) => {
    console.log("RECIBIDO:", e.data); // debug

    let data;

    try {
      data = JSON.parse(e.data);
    } catch {
      log("Mensaje inválido");
      return;
    }

    if (data.type === "message") {
      log(data.user + ": " + data.text);
    }

    if (data.type === "system") {
      log(data.text);
    }

    if (data.type === "bot") {
      log("BOT: " + data.text);
    }

    if (data.type === "error") {
      alert(data.text);
    }
  };
}

function send() {
  const msg = document.getElementById("message").value;

  socket.send(JSON.stringify({
    type: "message",
    text: msg
  }));

  log("Yo: " + msg);
}

function log(text) {
  const chat = document.getElementById("chat");
  chat.innerHTML += text + "<br>";
}
</script>

</body>
</html>
