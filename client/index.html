<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat WebSocket PRO</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}

.connect { background: #22c55e; }
.disconnect { background: #ef4444; }
.send { background: #3b82f6; }

#chat {
  height: 250px;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
}

/* mensajes */
.msg {
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  max-width: 75%;
}

.me {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.other {
  background: #334155;
}

.bot {
  background: #7c3aed;
}

.system {
  text-align: center;
  font-size: 12px;
  color: #facc15;
}
</style>

</head>

<body>

<div class="container">
<h2>💬 Chat WebSocket</h2>

<input id="url" value="wss://websocket-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com">
<input id="password" placeholder="Clave">
<input id="username" placeholder="Tu nombre">
<input id="room" placeholder="Sala">

<button class="connect" onclick="connect()">Conectar</button> <button class="disconnect" onclick="disconnect()">Salir</button>

<div id="chat"></div>

<input id="message" placeholder="Escribe un mensaje...">
<button class="send" onclick="send()">Enviar</button>
</div>

<script>
let socket;

function connect() {
  socket = new WebSocket(document.getElementById("url").value);

  socket.onopen = () => {
    log("Conectado 🚀", "system");

    socket.send(JSON.stringify({
      type: "auth",
      password: document.getElementById("password").value
    }));

    socket.send(JSON.stringify({
      type: "join",
      username: document.getElementById("username").value,
      room: document.getElementById("room").value
    }));
  };

  socket.onmessage = (e) => {
    let data;

    try {
      data = JSON.parse(e.data);
    } catch {
      return;
    }

    if (data.type === "message") {
      log(data.user + ": " + data.text, "other");
    }

    if (data.type === "bot") {
      log("🤖 " + data.text, "bot");
    }

    if (data.type === "system") {
      log(data.text, "system");
    }

    if (data.type === "error") {
      alert(data.text);
    }
  };

  socket.onclose = () => {
    log("Desconectado ❌", "system");
  };
}

function send() {
  const msg = document.getElementById("message").value;

  socket.send(JSON.stringify({
    type: "message",
    text: msg
  }));

  log("Yo: " + msg, "me");
  document.getElementById("message").value = "";
}

function disconnect() {
  socket.close();
}

function log(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
