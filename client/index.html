<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat PRO</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 420px;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

.tabs {
  display: flex;
  gap: 5px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

.active { background: #22c55e; }

#chat {
  height: 250px;
  overflow-y: auto;
  background: #020617;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.msg { margin: 5px; padding: 8px; border-radius: 10px; max-width: 70%; }
.me { background: #2563eb; margin-left: auto; }
.other { background: #334155; }
.bot { background: #7c3aed; }
.system { text-align: center; font-size: 12px; color: #facc15; }

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#qr {
  text-align:center;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>💬 Chat Inteligente</h2>
<p id="modeLabel" style="text-align:center;">Modo: Chat 👥</p>

<div class="tabs">
  <button id="chatBtn" class="active" onclick="setMode('chat')">👥 Chat</button>
  <button id="botBtn" onclick="setMode('bot')">🤖 Bot</button>
</div>

<!-- 🔒 URL fija -->

<input id="password" placeholder="Clave (1234)">
<input id="username" placeholder="Usuario">
<input id="room" placeholder="Sala (ej: 1002)">

<button onclick="connect()">Conectar</button>

<div id="chat"></div>

<input id="message" placeholder="Mensaje...">
<button onclick="send()">Enviar</button>

<div id="qr">
  <p>📱 Comparte esta sala</p>
  <img id="qrImg" width="150">
</div>

</div>

<script>
let socket;
let mode = "chat";

// 🔗 URL FIJA (NO TOCAR)
const WS_URL = "wss://websocket-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com";

// 📱 URL del cliente (para QR)
const BASE_URL = window.location.origin + window.location.pathname;

// 🔄 detectar sala en URL
const params = new URLSearchParams(window.location.search);
if (params.get("room")) {
  document.getElementById("room").value = params.get("room");
}

function setMode(m) {
  mode = m;

  document.getElementById("chatBtn").classList.remove("active");
  document.getElementById("botBtn").classList.remove("active");
  document.getElementById(m + "Btn").classList.add("active");

  document.getElementById("modeLabel").innerText =
    m === "bot" ? "Modo: Bot 🤖" : "Modo: Chat 👥";

  document.getElementById("chat").innerHTML = "";

  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.close();
    setTimeout(connect, 300);
  }
}

function connect() {

  const room = document.getElementById("room").value;

  // 🔥 generar QR con sala
  const shareURL = BASE_URL + "?room=" + encodeURIComponent(room);

  document.getElementById("qrImg").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
    encodeURIComponent(shareURL);

  socket = new WebSocket(WS_URL);

  socket.onopen = () => {

    socket.send(JSON.stringify({
      type: "auth",
      password: document.getElementById("password").value
    }));

    socket.send(JSON.stringify({
      type: "join",
      username: document.getElementById("username").value,
      room: room,
      mode: mode
    }));

    log("Conectado 🚀", "system");
  };

  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "message") {
      const user = document.getElementById("username").value;

      if (data.user === user) {
        log("Yo: " + data.text, "me");
      } else {
        log(data.user + ": " + data.text, "other");
      }
    }

    if (data.type === "bot") {
      log("🤖 " + data.text, "bot");
    }

    if (data.type === "system") {
      log(data.text, "system");
    }
  };
}

function send() {
  const msg = document.getElementById("message").value;

  socket.send(JSON.stringify({
    type: "message",
    text: msg
  }));

  document.getElementById("message").value = "";
}

function log(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
