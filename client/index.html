<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat WebSocket PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.connect { background: green; color: white; }
.disconnect { background: red; color: white; }

#chat {
  height: 250px;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  text-align: left;
}

.msg { margin: 5px; padding: 5px; border-radius: 5px; }
.me { background: #2563eb; text-align: right; }
.other { background: #334155; }
.bot { background: purple; }
.system { color: yellow; font-size: 12px; }
</style>
</head>

<body>

<div class="container">
<h2>💬 Chat WebSocket PRO</h2>

<input id="url" value="wss://websocket-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com">
<input id="password" placeholder="Clave">
<input id="username" placeholder="Tu nombre">
<input id="room" placeholder="Código sala">

<button class="connect" onclick="connect()">Conectar</button>
<button class="disconnect" onclick="disconnect()">Salir</button>

<div id="chat"></div>

<input id="message" placeholder="Mensaje...">
<button onclick="send()">Enviar</button>
</div>

<script>
let socket;

function connect() {
  socket = new WebSocket(document.getElementById("url").value);

  socket.onopen = () => {
    log("Conectado 🚀", "system");

    socket.send(JSON.stringify({
      type: "auth",
      password: document.getElementById("password").value
    }));

    socket.send(JSON.stringify({
      type: "join",
      username: document.getElementById("username").value,
      room: document.getElementById("room").value
    }));
  };

  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "message") {
      log(data.user + ": " + data.text, "other");
    }

    if (data.type === "bot") {
      log("🤖 " + data.text, "bot");
    }

    if (data.type === "system") {
      log(data.text, "system");
    }

    if (data.type === "error") {
      alert(data.text);
    }
  };
}

function send() {
  const msg = document.getElementById("message").value;

  socket.send(JSON.stringify({
    type: "message",
    text: msg
  }));

  log("Yo: " + msg, "me");
}

function disconnect() {
  socket.close();
}

function log(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
