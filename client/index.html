<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Chat Pro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h2 {
      margin-top: 20px;
    }

    .container {
      width: 80%;
      max-width: 700px;
      margin: auto;
      background: #ffffff;
      color: #333;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
      margin-top: 30px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 70%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    .connect {
      background-color: #28a745;
      color: white;
    }

    .disconnect {
      background-color: #dc3545;
      color: white;
    }

    .send {
      background-color: #007bff;
      color: white;
    }

    #chat {
      border: 1px solid #ccc;
      height: 250px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      background: #f9f9f9;
      text-align: left;
    }

    .msg {
      margin: 5px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .sent {
      background-color: #d1e7dd;
    }

    .received {
      background-color: #cfe2ff;
    }

    .status {
      font-weight: bold;
      margin: 10px 0;
    }

    .stats {
      margin-top: 10px;
    }
  </style>

</head>

<body>

<h2>💬 WebSocket Chat Pro</h2>

<div class="container">

<input id="url" type="text" 
value="wss://websocket-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com">

  <br>

<button class="connect" onclick="connect()">Conectar</button> <button class="disconnect" onclick="disconnect()">Desconectar</button>

  <div class="status" id="status">🔴 Desconectado</div>

  <hr>

  <input id="message" type="text" placeholder="Escribe un mensaje...">
  <button class="send" onclick="sendMessage()">Enviar</button>

  <h3>Mensajes</h3>

  <div id="chat"></div>

  <div class="stats">
    📤 Enviados: <span id="sent">0</span> |
    📥 Recibidos: <span id="received">0</span>
  </div>

</div>

<script>
let socket;
let sent = 0;
let received = 0;

function connect() {
  const url = document.getElementById("url").value;
  socket = new WebSocket(url);

  socket.onopen = () => {
    document.getElementById("status").innerText = "🟢 Conectado";
    log("Sistema", "Conectado al servidor");
  };

  socket.onmessage = (event) => {
    received++;
    document.getElementById("received").innerText = received;
    log("Servidor", event.data, "received");
  };

  socket.onclose = () => {
    document.getElementById("status").innerText = "🔴 Desconectado";
    log("Sistema", "Desconectado");
  };
}

function disconnect() {
  if (socket) socket.close();
}

function sendMessage() {
  const msg = document.getElementById("message").value;
  if (!msg) return;

  socket.send(msg);
  sent++;
  document.getElementById("sent").innerText = sent;

  log("Tú", msg, "sent");
  document.getElementById("message").value = "";
}

function log(sender, message, type="") {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.classList.add("msg");

  if (type === "sent") div.classList.add("sent");
  if (type === "received") div.classList.add("received");

  div.innerHTML = `<strong>${sender}:</strong> ${message}`;
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
